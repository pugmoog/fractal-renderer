<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/mathjs@15.1.1/lib/browser/math.min.js"></script>
  </head>
  <body>
    <h1>Mandelbrot Renderer</h1>
    <p>
      by pugmoog. <a href="https://pugmoog.com" target="_blank">pugmoog.com</a>
    </p>
    <br /><br />
    <button onclick="zoomIn();">zoom in</button>
    <button onclick="zoomOut();">zoom out</button>
    <br /><br />
    <canvas id="display" width="100" height="100"></canvas>
    <br /><br />
    <a>Resolution: </a
    ><input id="resolution-input" type="number" value="100" min="50" step="1" />
    <br />
    <a>Depth: </a
    ><input id="depth-input" type="number" value="100" min="50" step="1" />
    <br />
    <a>Color Intensity: </a
    ><input id="color-int-input" type="number" value="100" min="50" step="1" />
    <br /><br />
    <a>Screen Size: </a
    ><input
      id="screen-size-input"
      type="number"
      value="100"
      min="50"
      step="1"
    />
    <br />
    <button onclick="updateSettings();">Update</button>

    <script src="render.js"></script>
    <script src="main.js"></script>
  </body>
</html>
